name: Generate snake animation

on:
  schedule: # run automatically every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0  # Updated from @v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4.1.0  # Updated from @v4
        with:
          node-version: '24'

      - name: Generate snake svg
        uses: uses: Platane/snk/svg-only@main  # Updated from @v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0  # Updated from @v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Added this line
